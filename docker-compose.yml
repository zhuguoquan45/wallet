services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  wallet:
    build: .
    ports:
      - "8080:8080"
      - "5505:5505"
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":5505"
      STORAGE_TYPE: postgres
      POSTGRES_DSN: "postgres://wallet:wallet@postgres/wallet?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
